<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
		<title>altwine.dev — личный сайт</title>

		<meta name="author" content="altwine" />
		<meta name="theme-color" content="#000000" />
		<meta property="og:title" content="altwine.dev — личный сайт" />
		<meta property="og:description" content="Рад, что реально занимаюсь тем, что мне нравится =)" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://altwine.dev/" />
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Person",
				"name": "altwine",
				"alternateName": "altwine.dev",
				"url": "https://altwine.dev/",
				"jobTitle": "разработчик",
				"gender": "male",
				"sameAs": ["https://youtube.com/@altwine", "https://github.com/altwine"]
			}
		</script>
		<link rel="canonical" href="https://altwine.dev/" />
		<link rel="stylesheet" href="/src/style.css" />
		<link rel="icon" href="./favicon.svg" />
		<script type="module" src="/src/main.ts"></script>
	</head>
	<body>
		<header>
			<div class="profile-brand">
				<img
					class="brand-icon"
					width="40px"
					height="40px"
					draggable="false"
					alt="Логотип altwine"
					src="/assets/icons/brand.svg"
				/>
				<div class="brand-info">
					<h1 class="brand-title">altwine.dev</h1>
					<h2 class="brand-subtitle">мне нравится программирование</h2>
				</div>
			</div>
			<nav class="nav-buttons">
				<a class="nav-btn" href="https://github.com/altwine">
					<img
						class="nav-btn-icon"
						draggable="false"
						alt=""
						width="24px"
						height="24px"
						src="/assets/icons/github.svg"
					/>
					<span>GitHub</span>
				</a>
				<a class="nav-btn" href="https://youtube.com/@altwine">
					<img
						class="nav-btn-icon"
						draggable="false"
						alt=""
						width="24px"
						height="24px"
						src="/assets/icons/youtube.svg"
					/>
					<span>YouTube</span>
				</a>
				<a class="nav-btn" id="menu-btn" role="button" aria-label="Открыть меню" aria-expanded="false">
					<img
						class="nav-btn-icon"
						draggable="false"
						alt=""
						width="24px"
						height="24px"
						src="/assets/icons/burger.svg"
					/>
				</a>
			</nav>

		<canvas aria-hidden="true"></canvas>
